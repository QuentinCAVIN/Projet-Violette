# ARCHIVÉ — Oracle Cloud abandonné.
# Ce fichier était destiné à la VM Oracle Cloud (ARM Ampere A1).
# La stack de production est désormais : Fly.io (backend) + Aiven (MySQL).
# Cf. violette-back/fly.toml et README-deploiement.md.
# Conservé pour référence historique — ne pas utiliser en production.

services:

  mysql:
    image: mysql:8.0
    container_name: violette-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-violette_db}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - violette_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/quentincavin/violette-back:${BACKEND_IMAGE_TAG:-latest}
    container_name: violette-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-violette_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      QUARKUS_OIDC_ENABLED: "true"
      QUARKUS_OIDC_AUTH_SERVER_URL: https://securetoken.google.com/${FIREBASE_PROJECT_ID}
      QUARKUS_OIDC_CLIENT_ID: ${FIREBASE_PROJECT_ID}
      QUARKUS_OIDC_TOKEN_ISSUER: https://securetoken.google.com/${FIREBASE_PROJECT_ID}
      QUARKUS_OIDC_TOKEN_AUDIENCE: ${FIREBASE_PROJECT_ID}
      QUARKUS_OIDC_APPLICATION_TYPE: service
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  violette_mysql_data:
