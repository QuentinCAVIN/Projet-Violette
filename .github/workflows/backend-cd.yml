# ARCHIVÉ — Oracle Cloud abandonné.
# Ce workflow est désactivé. Le déploiement Fly.io est assuré par deploy.yml.
# Conserver pour référence historique. Ne pas supprimer sans mise à jour du README.
name: Backend CD (archivé)

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: violette-back

jobs:
  release-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: violette-back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and verify (tests + JaCoCo)
        run: ./mvnw clean verify -B

      - name: Compute image coordinates
        id: coords
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
          TAG="${GITHUB_REF#refs/tags/}"
          IMAGE="${{ env.REGISTRY }}/$OWNER_LC/${{ env.IMAGE_NAME }}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (émulation arm64 sur runner amd64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-platform image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: violette-back
          file: violette-back/src/main/docker/Dockerfile.jvm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.coords.outputs.image }}:${{ steps.coords.outputs.tag }}
            ${{ steps.coords.outputs.image }}:latest

      - name: Create GitHub Release (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.coords.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG existe déjà — pas de création."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Release $TAG" \
              --notes "Image Docker : \`${{ steps.coords.outputs.image }}:$TAG\` (multi-arch amd64/arm64) et \`:latest\`. L'APK est ajouté par le workflow **Flutter CD**." \
              --verify-tag
          fi

      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            export BACKEND_IMAGE_TAG="${{ steps.coords.outputs.tag }}"
            cd /opt/violette
            echo "Déploiement du tag $BACKEND_IMAGE_TAG..."
            docker compose pull backend
            docker compose up -d backend
            echo "Attente du démarrage (health check)..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8080/api/ping > /dev/null 2>&1; then
                echo "Backend opérationnel après $((i * 10)) secondes."
                exit 0
              fi
              sleep 10
            done
            echo "ERREUR : backend non disponible après 3 minutes."
            docker compose logs backend --tail=50
            exit 1
