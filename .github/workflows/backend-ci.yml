name: Backend CI

on:
  push:
    branches: ["main", "feature/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: violette-back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and verify (tests unitaires + ITs + JaCoCo)
        run: ./mvnw clean verify -B -DskipITs=false

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: violette-back/target/site/jacoco/
          retention-days: 7
