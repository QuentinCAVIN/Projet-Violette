name: Backend CI

on:
  push:
    branches: ["architecture-logicielle"]
  pull_request:
    branches: ["main", "architecture-logicielle"]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: violette-back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and verify
        run: ./mvnw clean verify -B
