# ARCHIVÉ — Absorbé dans deploy.yml (job release-apk).
# Ce workflow est désactivé pour éviter un double build APK sur les tags.
# Conserver pour référence historique. Ne pas supprimer sans mise à jour du README.
name: Flutter CD (archivé)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: violette_front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (requis par AGP 8.x)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # PROVISOIRE — À ALIGNER avec `flutter --version` sur ta machine locale avant le premier tag de production.
          # Vérifier que la version existe : https://github.com/flutter/flutter/releases
          # Exemple de commande : flutter --version → remplacer "3.27.4" par la version affichée.
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON_BASE64 manquant."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Prepare Android release signing
        working-directory: violette_front/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Secrets Android de signature manquants."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > violette-release.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=../violette-release.jks"
          } > key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Wait for GitHub Release (created by Backend CD)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Attente de la release GitHub pour le tag $TAG (créée par Backend CD)…"
          for i in $(seq 1 90); do
            if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release $TAG trouvée (tentative $i)."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Aucune release GitHub pour $TAG après 15 minutes. Vérifier que Backend CD a réussi."
          exit 1

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            build/app/outputs/flutter-apk/app-release.apk
