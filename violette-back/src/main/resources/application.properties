# ==============================================================
# Violette Backend - Configuration principale
# ==============================================================

# --------------------------------------------------------------
# Application
# --------------------------------------------------------------
quarkus.application.name=violette-back
quarkus.application.version=0.1.0

quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# --------------------------------------------------------------
# Datasource MySQL (production)
# Les variables d'environnement ont priorité sur les valeurs par défaut.
# --------------------------------------------------------------
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:violette}
quarkus.datasource.password=${DB_PASSWORD:violette}
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:violette_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC

quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# --------------------------------------------------------------
# Profil DEV : H2 in-memory (pas besoin de Docker/MySQL)
# Pour utiliser MySQL en dev, lancer avec : -Dquarkus.profile=dev-mysql
# --------------------------------------------------------------
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:violette_dev;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.flyway.enabled=false

# --------------------------------------------------------------
# Hibernate ORM
# La génération du schéma est déléguée à Flyway (none).
# La stratégie de nommage physique mappe camelCase → snake_case.
# --------------------------------------------------------------
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=true

# Profil dev : SQL visible dans les logs
%dev.quarkus.hibernate-orm.log.sql=true

# --------------------------------------------------------------
# Flyway - Migrations de base de données
# --------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.validate-on-migrate=true

# --------------------------------------------------------------
# OpenAPI / Swagger UI
# Swagger UI disponible sur /swagger-ui en dev et prod
# OpenAPI spec disponible sur /q/openapi
# --------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Violette API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=API REST du backend de la plateforme Violette - Gestion de compagnies de cabaret
quarkus.smallrye-openapi.info-contact-name=Equipe Violette

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Préfixe global pour tous les endpoints REST
quarkus.rest.path=/api

# --------------------------------------------------------------
# Sécurité - OIDC (JWT Bearer)
# Par défaut OIDC est désactivé : pas de validation JWT, /api/users/me répond 403.
# Pour activer Firebase : lancer avec le profil firebase et définir FIREBASE_PROJECT_ID.
# Voir application-firebase.properties et README.
# --------------------------------------------------------------
quarkus.oidc.enabled=false

# --------------------------------------------------------------
# Logs
# --------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."io.violette".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Profil dev : logs plus verbeux
%dev.quarkus.log.level=DEBUG
