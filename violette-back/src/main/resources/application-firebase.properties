# ==============================================================
# Profil Firebase - JWT Firebase Authentication + H2 locale
# ==============================================================
# Ce fichier est charge lorsque le profil "firebase" est actif.
# Toutes les proprietes ci-dessous s'appliquent alors (pas de prefixe %firebase necessaire).
#
# Obligatoire : FIREBASE_PROJECT_ID (env ou -D). Sans lui, demarrage en echec (URL OIDC invalide).
# Voir README section "Profil Firebase" pour le lancement et les exemples.
# ==============================================================

# --- OIDC / Firebase (validation des tokens) ---
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://securetoken.google.com/${FIREBASE_PROJECT_ID}
quarkus.oidc.client-id=${FIREBASE_PROJECT_ID}
quarkus.oidc.token.issuer=https://securetoken.google.com/${FIREBASE_PROJECT_ID}
quarkus.oidc.token.audience=${FIREBASE_PROJECT_ID}
quarkus.oidc.application-type=service

# --- Datasource H2 en memoire (lancement local sans MySQL) ---
# Permet de demarrer et tester GET /me et POST /users sans installer MySQL.
# Pour utiliser MySQL avec Firebase, definir un profil dedie (ex. dev-mysql) dans application.properties.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:violette_firebase;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.flyway.enabled=false
