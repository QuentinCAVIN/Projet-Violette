# ==============================================================
# Violette Backend - Configuration profil TEST
# Surcharge application.properties pour les tests JUnit.
# ==============================================================

# --------------------------------------------------------------
# Datasource H2 (in-memory, remplace MySQL en test)
# NON_KEYWORDS=VALUE évite les conflits avec les champs nommés "value"
# --------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:violette_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE,KEY

# --------------------------------------------------------------
# Hibernate ORM
# Hibernate génère le schéma depuis les entités en test.
# Flyway n'est pas utilisé (SQL MySQL non compatible H2).
# --------------------------------------------------------------
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# --------------------------------------------------------------
# Flyway - Désactivé pour les tests
# --------------------------------------------------------------
quarkus.flyway.enabled=false

# --------------------------------------------------------------
# Sécurité - Désactivée pour les tests
# --------------------------------------------------------------
quarkus.oidc.enabled=false
