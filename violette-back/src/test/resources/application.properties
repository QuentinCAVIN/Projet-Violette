# ==============================================================
# Violette Backend - Configuration profil TEST (H2)
# Surcharge pour les tests JUnit lorsque le profil actif est "test".
# Les tests *IT.java utilisent le profil "integration" (MySQL Dev Services).
# ==============================================================

# --------------------------------------------------------------
# Datasource H2 (in-memory, remplace MySQL en test)
# NON_KEYWORDS=VALUE évite les conflits avec les champs nommés "value"
# --------------------------------------------------------------
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:violette_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE,KEY

# --------------------------------------------------------------
# Hibernate ORM
# Hibernate génère le schéma depuis les entités en test.
# Flyway n'est pas utilisé (SQL MySQL non compatible H2).
# --------------------------------------------------------------
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.log.format-sql=true

# --------------------------------------------------------------
# Flyway - Désactivé pour les tests H2
# --------------------------------------------------------------
%test.quarkus.flyway.enabled=false

# --------------------------------------------------------------
# Sécurité - Désactivée pour les tests
# --------------------------------------------------------------
%test.quarkus.oidc.enabled=false
