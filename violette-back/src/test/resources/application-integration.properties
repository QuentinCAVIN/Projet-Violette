# ==============================================================
# Violette Backend - Configuration profil INTEGRATION
# Utilisé par les tests *IT.java via MySQLIntegrationTestProfile.
# MySQL via Quarkus Dev Services (Testcontainers) : ne pas définir jdbc.url ni
# identifiants ici — la propriété doit être absente pour que Quarkus démarre
# le conteneur et injecte l'URL (une chaîne vide désactive le datasource).
# db-kind=mysql est hérité de application.properties (racine).
# Nécessite Docker au moment de l'exécution.
# ==============================================================

# Flyway activé : vérifie que les migrations V1–V5 s'appliquent sur MySQL
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true

# OIDC désactivé (pas de Firebase en tests d'intégration)
quarkus.oidc.enabled=false
