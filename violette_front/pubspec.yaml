name: violette_front
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0

  stacked: ^3.5.0
  stacked_services: ^1.5.0
  stacked_firebase_auth: ^2.21.0
  table_calendar: ^3.2.0
  intl: ^0.20.2

  # Client REST généré par OpenAPI Generator — ne pas modifier manuellement
  violette_api_client:
    path: ../violette_api_client
  dio: ^5.7.0
  built_collection: '>=5.1.1 <6.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.5
  build_runner: ^2.4.6
  stacked_generator: ^1.5.3
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  

  assets:
    - assets/images/
